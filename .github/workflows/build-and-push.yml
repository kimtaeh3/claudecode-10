name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
      - '**'  # Trigger on all branches for flexibility
  workflow_dispatch:  # Allow manual triggering

env:
  IMAGE_PATH: rampraga/q360auto
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug secrets
        run: |
          echo "Username is set? ${{ secrets.DOCKER_HUB_USERNAME != '' }}"
          echo "PAT is set? ${{ secrets.DOCKER_HUB_PAT != '' }}"
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Extract branch name
        shell: bash
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_PATH }}:${{ github.run_number }}
            ${{ env.IMAGE_PATH }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PATH }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PATH }}:buildcache,mode=max

      - name: Image pushed successfully
        run: echo "Docker image pushed to Docker Hub - ${{ env.IMAGE_PATH }}:${{ github.run_number }} and ${{ env.IMAGE_PATH }}:latest"

      - name: Deploy to Portainer
        run: echo "Deploy to Portainer implementation pending"
        # TODO: Add Portainer deployment logic when ready

  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    steps:
      - name: Clean up Docker images
        run: |
          echo "Local cleanup handled by GitHub Actions ephemeral runners"
          # GitHub Actions automatically cleans up the runner after the job completes
