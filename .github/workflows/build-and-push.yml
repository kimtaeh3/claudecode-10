name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_PATH: rampraga/q360auto
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Check secrets are set
        run: |
          echo "DOCKER_HUB_USERNAME set: ${{ secrets.DOCKER_HUB_USERNAME != '' }}"
          echo "DOCKER_HUB_PAT set: ${{ secrets.DOCKER_HUB_PAT != '' }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_PATH }}:${{ github.run_number }}
            ${{ env.IMAGE_PATH }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PATH }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PATH }}:buildcache,mode=max

      - name: Deploy to Portainer (force specific image tag)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"env\": [
                {\"name\": \"IMAGE_TAG\", \"value\": \"${{ github.run_number }}\"},
                {\"name\": \"SECRET_KEY\", \"value\": \"${{ secrets.SECRET_KEY }}\"},
                {\"name\": \"HOST_PORT\", \"value\": \"8080\"}
              ],
              \"pullImage\": true,
              \"prune\": false
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Portainer deploy failed with status $HTTP_CODE"
            exit 1
          fi
