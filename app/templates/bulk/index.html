{% extends "base.html" %}
{% block title %}Bulk Upload{% endblock %}
{% block content %}
<h4 class="mb-4">Bulk Upload Hours</h4>

<div class="row">
  <div class="col-lg-6">
    <form hx-post="{{ url_for('bulk.parse') }}"
          hx-target="#bulk-table"
          hx-indicator="#parse-spinner"
          hx-encoding="multipart/form-data"
          hx-on::before-request="document.getElementById('bulk-table').innerHTML = ''">

      <div class="mb-3">
        <label class="form-label">Excel File (.xlsx or .xlsb)</label>
        <input type="file" name="file" class="form-control" accept=".xlsx,.xlsb" required>
      </div>


      <div class="d-flex align-items-center gap-3">
        <button type="submit" class="btn btn-primary">Parse File</button>
        <span id="parse-spinner" class="htmx-indicator spinner-border spinner-border-sm text-primary"></span>
      </div>
    </form>
  </div>
</div>

<div id="bulk-table" class="mt-4"></div>

{% endblock %}
