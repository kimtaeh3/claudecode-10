{% extends "base.html" %}
{% block title %}Bulk Upload{% endblock %}
{% block content %}

<div class="row justify-content-center mt-3">
  <div class="col-lg-5 col-md-7">

    <div class="card shadow-sm border-0" style="border-radius:12px;overflow:hidden">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1">Bulk Upload Hours</h5>
        <p class="text-muted small mb-4">Upload an Excel file to review and submit hours for your team.</p>

        <form id="parse-form">

          <!-- File picker -->
          <div class="mb-4">
            <label class="form-label fw-semibold small text-uppercase text-secondary" style="letter-spacing:.04em">Excel File</label>
            <label id="file-label" class="d-flex align-items-center gap-3 p-3 rounded-3 border border-2 border-dashed"
                   style="cursor:pointer;border-color:#dee2e6!important;transition:border-color .15s">
              <div class="rounded-2 bg-primary bg-opacity-10 d-flex align-items-center justify-content-center flex-shrink-0"
                   style="width:36px;height:36px">
                <i class="bi bi-file-earmark-spreadsheet text-primary"></i>
              </div>
              <div class="flex-grow-1 overflow-hidden">
                <div id="file-name" class="text-muted small">Choose .xlsx or .xlsb file…</div>
              </div>
              <input type="file" name="file" accept=".xlsx,.xlsb" required
                     class="d-none" id="file-input"
                     onchange="onFileChange(this)">
            </label>
          </div>

          <!-- Date range -->
          <div class="mb-4">
            <label class="form-label fw-semibold small text-uppercase text-secondary" style="letter-spacing:.04em">Date Range</label>
            <input type="hidden" name="date_filter" id="date-filter-input" value="month">
            <div class="d-flex gap-2 flex-wrap">
              <button type="button" class="date-preset-btn btn btn-sm btn-light border px-3" data-preset="all"   onclick="pickPreset('all')">All</button>
              <button type="button" class="date-preset-btn btn btn-sm btn-light border px-3" data-preset="week"  onclick="pickPreset('week')">This Week</button>
              <button type="button" class="date-preset-btn btn btn-sm btn-primary border-0 px-3 active" data-preset="month" onclick="pickPreset('month')">This Month</button>
              <button type="button" class="date-preset-btn btn btn-sm btn-light border px-3" data-preset="year"  onclick="pickPreset('year')">This Year</button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-primary w-100 fw-semibold" style="border-radius:8px">
            Parse File
          </button>

        </form>
      </div>
    </div>

  </div>
</div>

<!-- Parse progress overlay -->
<div id="parse-overlay" style="
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  z-index:10000;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(2px)">
  <div class="card shadow-lg border-0" style="width:380px;border-radius:16px;overflow:hidden">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="d-flex align-items-center gap-3">
          <div class="spinner-border spinner-border-sm text-primary flex-shrink-0" role="status"></div>
          <span class="fw-semibold">Processing File…</span>
        </div>
        <div id="parse-timer" class="text-secondary" style="font-size:.8rem;font-variant-numeric:tabular-nums">0s</div>
      </div>
      <div class="d-flex justify-content-between align-items-baseline mb-1">
        <div id="parse-status" class="text-muted" style="font-size:.82rem;min-height:1.3em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:270px"></div>
        <div id="parse-pct" class="fw-bold text-primary ms-2" style="font-size:.82rem;min-width:2.8em;text-align:right">0%</div>
      </div>
      <div id="parse-substatus" class="text-secondary mb-2" style="font-size:.75rem;min-height:1em"></div>
      <div class="progress" style="height:6px;border-radius:99px;background:#e9ecef">
        <div id="parse-progress-bar"
             class="progress-bar progress-bar-striped progress-bar-animated"
             style="width:0%;border-radius:99px;transition:width 0.6s ease"></div>
      </div>
    </div>
  </div>
</div>

<div id="bulk-table" class="mt-4"></div>

<script>
function onFileChange(input) {
  const name = input.files[0]?.name || 'Choose .xlsx or .xlsb file…';
  document.getElementById('file-name').textContent = name;
  document.getElementById('file-label').style.borderColor = input.files[0] ? '#0d6efd' : '';
}

function pickPreset(mode) {
  document.getElementById('date-filter-input').value = mode;
  document.querySelectorAll('.date-preset-btn').forEach(b => {
    const active = b.dataset.preset === mode;
    b.classList.toggle('btn-primary', active);
    b.classList.toggle('border-0', active);
    b.classList.toggle('btn-light', !active);
    b.classList.toggle('border', !active);
  });
}

(function () {
  let timerInterval = null, startTime = 0;

  function setProgress(pct, msg, sub) {
    document.getElementById('parse-progress-bar').style.width = pct + '%';
    document.getElementById('parse-pct').textContent = pct + '%';
    document.getElementById('parse-status').textContent = msg;
    const subEl = document.getElementById('parse-substatus');
    if (subEl) subEl.textContent = sub || '';
  }

  function tickTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const label = elapsed < 60 ? elapsed + 's'
      : Math.floor(elapsed / 60) + 'm ' + String(elapsed % 60).padStart(2, '0') + 's';
    document.getElementById('parse-timer').textContent = label;
  }

  function startProgress() {
    startTime = Date.now();
    document.getElementById('parse-overlay').style.display = 'flex';
    document.getElementById('parse-timer').textContent = '0s';
    setProgress(5, 'Reading Excel file\u2026', '');
    timerInterval = setInterval(tickTimer, 500);
  }

  function stopProgress() {
    clearInterval(timerInterval);
    tickTimer();
    setProgress(100, 'Done!', '');
    setTimeout(() => { document.getElementById('parse-overlay').style.display = 'none'; }, 400);
  }

  function injectHTML(html) {
    const container = document.getElementById('bulk-table');
    container.innerHTML = html;
    // Re-execute inline scripts (innerHTML doesn't run them)
    container.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  document.getElementById('parse-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    document.getElementById('bulk-table').innerHTML = '';
    startProgress();

    let resp;
    try {
      resp = await fetch('{{ url_for("bulk.parse") }}', {
        method: 'POST',
        body: new FormData(this),
      });
    } catch (err) {
      stopProgress();
      document.getElementById('bulk-table').innerHTML =
        `<div class="alert alert-danger">Network error: ${err.message}</div>`;
      return;
    }

    if (!resp.ok) {
      stopProgress();
      document.getElementById('bulk-table').innerHTML =
        `<div class="alert alert-danger">Server error ${resp.status}</div>`;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop(); // keep any incomplete trailing chunk
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }

          if (data.type === 'progress') {
            // 10% base + up to 80% for Q360 fetching, leaving 10% for rendering
            const fetchPct = data.total > 0
              ? Math.round(10 + (data.done / data.total) * 80)
              : 10;
            const sub = data.total > 0
              ? `${data.done} / ${data.total} users`
              : '';
            setProgress(fetchPct, data.user ? `Fetching \u2014 ${data.user}` : data.msg, sub);

          } else if (data.type === 'complete') {
            setProgress(95, 'Rendering table\u2026', '');
            setTimeout(() => {
              stopProgress();
              injectHTML(data.html);
            }, 200);

          } else if (data.type === 'error') {
            stopProgress();
            injectHTML(data.html);
          }
        }
      }
    } catch (err) {
      stopProgress();
      document.getElementById('bulk-table').innerHTML =
        `<div class="alert alert-danger">Stream error: ${err.message}</div>`;
    }
  });
})();
</script>

{% endblock %}
