<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Q360 Auto{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon-q360.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="bg-light">

{% if session.get('user_id') %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('hours.view') }}">Q360 Auto</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle {% if request.endpoint == 'bulk.index' %}active{% endif %}"
             href="#" role="button" data-bs-toggle="dropdown">Bulk Upload</a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item {% if request.endpoint == 'bulk.index' and request.args.get('tab','q360')=='q360' %}active{% endif %}"
                   href="{{ url_for('bulk.index') }}?tab=q360">Q360</a></li>
            <li><a class="dropdown-item {% if request.endpoint == 'bulk.index' and request.args.get('tab')=='overtime' %}active{% endif %}"
                   href="{{ url_for('bulk.index') }}?tab=overtime">Overtime</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'hours.view' %}active{% endif %}"
             href="{{ url_for('hours.view') }}">View Hours</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'hours.submit' %}active{% endif %}"
             href="{{ url_for('hours.submit') }}">Submit Hours</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'forecast.index' %}active{% endif %}"
             href="{{ url_for('forecast.index') }}">Utilization</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle {% if request.endpoint in ('admin.users', 'admin.projects', 'admin.holidays') %}active{% endif %}"
             href="#" role="button" data-bs-toggle="dropdown">Settings</a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item {% if request.endpoint == 'admin.users' %}active{% endif %}"
                   href="{{ url_for('admin.users') }}">Team</a></li>
            <li><a class="dropdown-item {% if request.endpoint == 'admin.projects' %}active{% endif %}"
                   href="{{ url_for('admin.projects') }}">Project Codes</a></li>
            <li><a class="dropdown-item {% if request.endpoint == 'admin.holidays' %}active{% endif %}"
                   href="{{ url_for('admin.holidays') }}">Holidays</a></li>
          </ul>
        </li>
      </ul>
      <span class="navbar-text me-3 text-secondary">{{ session.user_id }}</span>
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('auth.logout') }}">Logout</a>
    </div>
  </div>
</nav>
{% endif %}

<!-- Click-blocking overlay shown during any HTMX request -->
<div id="htmx-overlay">
  <div class="spinner-border text-light" role="status"></div>
</div>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
