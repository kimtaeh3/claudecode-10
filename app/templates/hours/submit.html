{% extends "base.html" %}
{% block title %}Submit Hours{% endblock %}
{% block content %}
<h4 class="mb-4">Submit Hours</h4>

<div class="row">
  <div class="col-lg-7">
    <form id="hours-form" onsubmit="return false;">

      {% if is_admin %}
      <div class="mb-3">
        <label class="form-label">Submit on behalf of (User ID)</label>
        <div class="input-group">
          <input type="text" name="target_user" id="target_user" class="form-control"
                 placeholder="Type user ID, leave blank for yourself"
                 autocomplete="off">
          <button type="button" class="btn btn-outline-secondary"
                  hx-get="{{ url_for('hours.projects') }}"
                  hx-trigger="click"
                  hx-target="#project-select"
                  hx-include="#target_user"
                  hx-indicator="#proj-spinner"
                  onclick="resetConfirm()">
            Refresh Projects
          </button>
        </div>
        <div class="form-text">Press <strong>Refresh Projects</strong> after entering a user ID.</div>
      </div>
      {% endif %}

      <div class="mb-3">
        <label class="form-label">Project</label>
        <select name="task_number" id="project-select" class="form-select" required
                hx-get="{{ url_for('hours.projects') }}"
                hx-trigger="load"
                hx-indicator="#proj-spinner"
                onchange="document.getElementById('task_label').value = this.options[this.selectedIndex].text; resetConfirm()">
          <option disabled selected>Loading projects…</option>
        </select>
        <input type="hidden" name="task_label" id="task_label" value="">
        <span id="proj-spinner" class="htmx-indicator text-muted small ms-1">
          <span class="spinner-border spinner-border-sm"></span> Fetching projects…
        </span>
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
          <option value="">Auto (from task)</option>
          {% for c in categories %}
          <option value="{{ c }}" {% if c == 'VOICE- CCAPPDEV' %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Company</label>
        <select name="company" class="form-select">
          {% for c in companies %}
          <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Entry type</label>
        <div class="d-flex gap-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="entry" value="Single" id="single"
                   onchange="toggleEntry('Single')">
            <label class="form-check-label" for="single">Single</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="entry" value="Multiple" id="multiple" checked
                   onchange="toggleEntry('Multiple')">
            <label class="form-check-label" for="multiple">Multiple days</label>
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Mode</label>
        <div class="d-flex gap-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="mode" value="time" id="mtime" checked
                   onchange="toggleMode('time')">
            <label class="form-check-label" for="mtime">Start/End time</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="mode" value="hours" id="mhours"
                   onchange="toggleMode('hours')">
            <label class="form-check-label" for="mhours">Hours total</label>
          </div>
        </div>
      </div>

      <!-- Time mode -->
      <div id="mode-time">
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label date-label">Start date</label>
            <input type="date" name="start_date" class="form-control">
          </div>
          <div class="col-6">
            <label class="form-label">Start time</label>
            <input type="time" name="start_time" class="form-control" value="09:00">
          </div>
          <div class="col-6 end-date-row">
            <label class="form-label">End date</label>
            <input type="date" name="end_date" class="form-control">
          </div>
          <div class="col-6">
            <label class="form-label">End time</label>
            <input type="time" name="end_time" class="form-control" value="17:00">
          </div>
        </div>
      </div>

      <!-- Hours mode -->
      <div id="mode-hours" style="display:none">
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label date-label">Start date</label>
            <input type="date" name="start_date" class="form-control">
          </div>
          <div class="col-6 end-date-row">
            <label class="form-label">End date</label>
            <input type="date" name="end_date" class="form-control">
          </div>
          <div class="col-6">
            <label class="form-label">Start time</label>
            <input type="time" name="start_time" class="form-control" value="09:00">
          </div>
          <div class="col-6">
            <label class="form-label">Hours</label>
            <input type="number" name="hours_log" class="form-control" min="1" max="10" value="8">
          </div>
        </div>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" name="weekends" id="weekends">
        <label class="form-check-label" for="weekends">Include weekends</label>
      </div>

      <div class="mb-3">
        <label class="form-label">Note</label>
        <input type="text" name="note" class="form-control" value="POWERED BY Q360 AUTO APP">
      </div>

      <div class="d-flex align-items-center gap-3">
        <button type="button" id="btn-confirm" class="btn btn-primary"
                hx-post="{{ url_for('hours.preview') }}"
                hx-include="#hours-form"
                hx-target="#submit-result"
                hx-indicator="#spinner"
                onclick="resetConfirm()">
          Confirm
        </button>
        <button type="button" id="btn-submit" class="btn btn-secondary" disabled
                hx-post="{{ url_for('hours.submit_action') }}"
                hx-include="#hours-form"
                hx-target="#submit-result"
                hx-indicator="#spinner"
                onclick="resetConfirm()">
          Submit
        </button>
        <span id="spinner" class="htmx-indicator spinner-border spinner-border-sm text-primary"></span>
      </div>
    </form>
  </div>

  <div class="col-lg-5 mt-4 mt-lg-0">
    <div id="submit-result"></div>
  </div>
</div>

<script>
function toggleMode(mode) {
  document.getElementById('mode-time').style.display = mode === 'time' ? '' : 'none';
  document.getElementById('mode-hours').style.display = mode === 'hours' ? '' : 'none';
  const entry = document.querySelector('input[name="entry"]:checked')?.value || 'Multiple';
  toggleEntry(entry);
  resetConfirm();
}

function toggleEntry(entry) {
  const single = (entry === 'Single');
  document.querySelectorAll('.end-date-row').forEach(el => {
    el.style.display = single ? 'none' : '';
  });
  document.querySelectorAll('.date-label').forEach(el => {
    el.textContent = single ? 'Date' : 'Start date';
  });
  resetConfirm();
}

function resetConfirm() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.classList.remove('btn-success');
  btn.classList.add('btn-secondary');
  document.getElementById('submit-result').innerHTML = '';
}

// Prevent Enter from triggering anything
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') e.preventDefault();
});

// Apply initial state on load
toggleEntry('Multiple');
</script>
{% endblock %}
