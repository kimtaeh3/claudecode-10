{% extends "base.html" %}
{% block title %}Submit Hours{% endblock %}
{% block content %}
<h4 class="mb-4">Submit Hours</h4>

<div class="row">
  <div class="col-lg-9">
    <form id="hours-form" onsubmit="return false;">

      {% if is_admin %}
      <div class="mb-3">
        <label class="form-label">Submit on behalf of (User ID)</label>
        <div class="input-group">
          <input type="text" name="target_user" id="target_user" class="form-control"
                 placeholder="Type user ID, leave blank for yourself"
                 autocomplete="off">
          <button type="button" class="btn btn-outline-secondary"
                  hx-get="{{ url_for('hours.projects') }}"
                  hx-trigger="click"
                  hx-target="#project-select"
                  hx-include="#target_user"
                  hx-indicator="#proj-spinner"
                  onclick="resetConfirm()">
            Update
          </button>
        </div>
        <div class="form-text">Enter a user ID then press <strong>Update</strong> to load their projects.</div>
      </div>
      {% endif %}

      <div class="mb-3">
        <label class="form-label">Project</label>
        <select name="task_number" id="project-select" class="form-select" required
                onchange="document.getElementById('task_label').value = this.options[this.selectedIndex].text; resetConfirm()">
          <option disabled selected>Enter a user ID and click Update…</option>
        </select>
        <input type="hidden" name="task_label" id="task_label" value="">
        <span id="proj-spinner" class="htmx-indicator text-muted small ms-1">
          <span class="spinner-border spinner-border-sm"></span> Fetching projects…
        </span>
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
          <option value="">Auto (from task)</option>
          {% for c in categories %}
          <option value="{{ c }}" {% if c == 'VOICE- CCAPPDEV' %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Company</label>
        <select name="company" class="form-select">
          {% for c in companies %}
          <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Entry type</label>
        <div class="d-flex gap-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="entry" value="Single" id="single"
                   onchange="toggleEntry('Single')">
            <label class="form-check-label" for="single">Single</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="entry" value="Multiple" id="multiple" checked
                   onchange="toggleEntry('Multiple')">
            <label class="form-check-label" for="multiple">Multiple days</label>
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Mode</label>
        <div class="d-flex gap-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="mode" value="time" id="mtime" checked
                   onchange="toggleMode('time')">
            <label class="form-check-label" for="mtime">Start/End time</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="mode" value="hours" id="mhours"
                   onchange="toggleMode('hours')">
            <label class="form-check-label" for="mhours">Hours total</label>
          </div>
        </div>
      </div>

      <!-- Time mode -->
      <div id="mode-time">
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label date-label">Start date</label>
            <input type="date" name="start_date" class="form-control">
          </div>
          <div class="col-6">
            <label class="form-label">Start time</label>
            <input type="time" name="start_time" class="form-control" value="09:00">
          </div>
          <div class="col-6 end-date-row">
            <label class="form-label">End date</label>
            <input type="date" name="end_date" class="form-control">
          </div>
          <div class="col-6">
            <label class="form-label">End time</label>
            <input type="time" name="end_time" class="form-control" value="17:00">
          </div>
        </div>
      </div>

      <!-- Hours mode -->
      <div id="mode-hours" style="display:none">
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label date-label">Start date</label>
            <input type="date" name="start_date" class="form-control">
          </div>
          <div class="col-6 end-date-row">
            <label class="form-label">End date</label>
            <input type="date" name="end_date" class="form-control">
          </div>
          <div class="col-6">
            <label class="form-label">Start time</label>
            <input type="time" name="start_time" class="form-control" value="09:00">
          </div>
          <div class="col-6">
            <label class="form-label">Hours</label>
            <input type="number" name="hours_log" class="form-control" min="1" max="10" value="8">
          </div>
        </div>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" name="weekends" id="weekends">
        <label class="form-check-label" for="weekends">Include weekends</label>
      </div>

      <div class="mb-3">
        <label class="form-label">Note</label>
        <input type="text" name="note" class="form-control" placeholder="Optional note">
      </div>

      <div id="submit-result" class="mb-3"></div>

      <div class="d-flex align-items-center gap-3">
        <button type="button" id="btn-confirm" class="btn btn-primary"
                hx-post="{{ url_for('hours.preview') }}"
                hx-include="#hours-form"
                hx-target="#submit-result"
                hx-indicator="#spinner"
                onclick="resetConfirm()">
          Confirm
        </button>
        <button type="button" id="btn-submit" class="btn btn-secondary" disabled
                onclick="doSubmit()">
          Submit
        </button>
        <span id="spinner" class="htmx-indicator spinner-border spinner-border-sm text-primary"></span>
      </div>
    </form>
  </div>
</div>

<!-- Submit overlay -->
<div id="hours-submit-overlay" style="
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  z-index:10000;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(2px)">
  <div class="card shadow-lg border-0" style="width:380px;border-radius:16px;overflow:hidden">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="d-flex align-items-center gap-3">
          <div class="spinner-border spinner-border-sm text-primary flex-shrink-0" role="status"></div>
          <span class="fw-semibold">Submitting Hours&hellip;</span>
        </div>
        <div id="hours-submit-timer" class="text-secondary" style="font-size:.8rem;font-variant-numeric:tabular-nums">0s</div>
      </div>
      <div class="d-flex justify-content-between align-items-baseline mb-1">
        <div id="hours-submit-status" class="text-muted" style="font-size:.82rem;min-height:1.3em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:270px"></div>
        <div id="hours-submit-pct" class="fw-bold text-primary ms-2" style="font-size:.82rem;min-width:2.8em;text-align:right">0%</div>
      </div>
      <div id="hours-submit-substatus" class="text-secondary mb-2" style="font-size:.75rem;min-height:1em"></div>
      <div class="progress" style="height:6px;border-radius:99px;background:#e9ecef">
        <div id="hours-submit-bar"
             class="progress-bar progress-bar-striped progress-bar-animated"
             style="width:0%;border-radius:99px;transition:width 0.6s ease"></div>
      </div>
    </div>
  </div>
</div>

<script>
function toggleMode(mode) {
  document.getElementById('mode-time').style.display = mode === 'time' ? '' : 'none';
  document.getElementById('mode-hours').style.display = mode === 'hours' ? '' : 'none';
  const entry = document.querySelector('input[name="entry"]:checked')?.value || 'Multiple';
  toggleEntry(entry);
  resetConfirm();
}

function toggleEntry(entry) {
  const single = (entry === 'Single');
  document.querySelectorAll('.end-date-row').forEach(el => {
    el.style.display = single ? 'none' : '';
  });
  document.querySelectorAll('.date-label').forEach(el => {
    el.textContent = single ? 'Date' : 'Start date';
  });
  resetConfirm();
}

function resetConfirm() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.classList.remove('btn-success');
  btn.classList.add('btn-secondary');
  document.getElementById('submit-result').innerHTML = '';
}

// Prevent Enter from triggering anything
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') e.preventDefault();
});

// Apply initial state on load
toggleEntry('Multiple');

(function () {
  let timerInterval = null, startTime = 0;

  function setProgress(pct, msg, sub) {
    document.getElementById('hours-submit-bar').style.width = pct + '%';
    document.getElementById('hours-submit-pct').textContent = pct + '%';
    document.getElementById('hours-submit-status').textContent = msg;
    const subEl = document.getElementById('hours-submit-substatus');
    if (subEl) subEl.textContent = sub || '';
  }

  function tickTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const label = elapsed < 60 ? elapsed + 's'
      : Math.floor(elapsed / 60) + 'm ' + String(elapsed % 60).padStart(2, '0') + 's';
    document.getElementById('hours-submit-timer').textContent = label;
  }

  function startOverlay() {
    startTime = Date.now();
    document.getElementById('hours-submit-overlay').style.display = 'flex';
    document.getElementById('hours-submit-timer').textContent = '0s';
    setProgress(5, 'Connecting to Q360\u2026', '');
    timerInterval = setInterval(tickTimer, 500);
  }

  function stopOverlay() {
    clearInterval(timerInterval);
    tickTimer();
    setProgress(100, 'Done!', '');
    setTimeout(() => { document.getElementById('hours-submit-overlay').style.display = 'none'; }, 400);
  }

  window.doSubmit = async function () {
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    startOverlay();

    let resp;
    try {
      resp = await fetch('{{ url_for("hours.submit_action") }}', {
        method: 'POST',
        body: new FormData(document.getElementById('hours-form')),
      });
    } catch (err) {
      stopOverlay();
      document.getElementById('submit-result').innerHTML =
        `<div class="alert alert-danger">Network error: ${err.message}</div>`;
      btn.disabled = false;
      return;
    }

    if (!resp.ok) {
      stopOverlay();
      document.getElementById('submit-result').innerHTML =
        `<div class="alert alert-danger">Server error ${resp.status}</div>`;
      btn.disabled = false;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }

          if (data.type === 'progress') {
            const pct = data.total > 0
              ? Math.round(5 + (data.done / data.total) * 90)
              : 10;
            const sub = data.total > 0 ? `${data.done} / ${data.total} entries` : '';
            setProgress(pct, data.msg || 'Submitting\u2026', sub);

          } else if (data.type === 'complete') {
            setProgress(98, 'Finishing\u2026', '');
            setTimeout(() => {
              stopOverlay();
              document.getElementById('submit-result').innerHTML = data.html;
              document.getElementById('submit-result').scrollIntoView({ behavior: 'smooth' });
            }, 200);

          } else if (data.type === 'error') {
            stopOverlay();
            document.getElementById('submit-result').innerHTML = data.html;
            btn.disabled = false;
          }
        }
      }
    } catch (err) {
      stopOverlay();
      document.getElementById('submit-result').innerHTML =
        `<div class="alert alert-danger">Stream error: ${err.message}</div>`;
      btn.disabled = false;
    }
  };
})();
</script>
{% endblock %}
