{% extends "base.html" %}
{% block title %}Team Management{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h4 class="mb-0">Team Management</h4>
  <button class="btn btn-primary btn-sm" onclick="openAddMemberModal()">
    <i class="bi bi-person-plus me-1"></i>Add Member
  </button>
</div>

<div id="members-table">
  {% include 'admin/_members_table.html' %}
</div>

<!-- Add Member Modal -->
<div class="modal fade" id="addMemberModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content border-0 shadow" style="border-radius:12px;overflow:hidden">
      <div class="modal-header border-0 pb-1">
        <h6 class="modal-title fw-semibold">Add Member</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-1">
        <div class="mb-2">
          <input type="text" class="form-control form-control-sm" id="add-name"
                 placeholder="Full name" autocomplete="off">
        </div>
        <div class="mb-2">
          <input type="text" class="form-control form-control-sm" id="add-username"
                 placeholder="Q360 User ID" autocomplete="off">
        </div>
        <div class="mb-2">
          <input type="text" class="form-control form-control-sm" id="add-team"
                 placeholder="Team name" autocomplete="off"
                 list="add-team-list">
          <datalist id="add-team-list">
            {% for t in teams %}<option value="{{ t }}">{% endfor %}
          </datalist>
        </div>
        <div class="mb-2">
          <input type="email" class="form-control form-control-sm" id="add-email"
                 placeholder="Email (optional)" autocomplete="off">
        </div>
        <div id="add-member-error" class="text-danger small" style="display:none"></div>
      </div>
      <div class="modal-footer border-0 pt-0 gap-2">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="saveAddMember()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
let _addMemberModal = null;

function openAddMemberModal() {
  document.getElementById('add-name').value = '';
  document.getElementById('add-username').value = '';
  document.getElementById('add-team').value = '';
  document.getElementById('add-email').value = '';
  document.getElementById('add-member-error').style.display = 'none';
  if (!_addMemberModal) {
    _addMemberModal = new bootstrap.Modal(document.getElementById('addMemberModal'));
  }
  _addMemberModal.show();
  document.getElementById('addMemberModal').addEventListener('shown.bs.modal', function focusOnce() {
    document.getElementById('add-username').focus();
    document.getElementById('addMemberModal').removeEventListener('shown.bs.modal', focusOnce);
  });
}

function saveAddMember() {
  const name     = document.getElementById('add-name').value.trim();
  const username = document.getElementById('add-username').value.trim();
  const team     = document.getElementById('add-team').value.trim();
  const email    = document.getElementById('add-email').value.trim();
  const err      = document.getElementById('add-member-error');
  if (!username || !team) {
    err.textContent = 'Username and team are required.';
    err.style.display = '';
    return;
  }
  err.style.display = 'none';
  const fd = new FormData();
  fd.append('name', name);
  fd.append('username', username);
  fd.append('team', team);
  fd.append('email', email);
  fetch('{{ url_for("admin.add_user") }}', { method: 'POST', body: fd,
    headers: { 'HX-Request': 'true' } })
    .then(r => {
      if (r.status === 409) {
        return r.text().then(msg => { err.textContent = msg; err.style.display = ''; return null; });
      }
      return r.text();
    })
    .then(html => {
      if (!html) return;
      document.getElementById('members-table').innerHTML = html;
      _addMemberModal.hide();
      if (window.htmx) htmx.process(document.getElementById('members-table'));
    });
}
</script>
{% endblock %}
