    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='index.css')}}">

<body>
    <div class="center">
        <div class="logo">
            <img src="{{ url_for('static', filename='/img/Q360Auto4.gif')}}" alt="q360auto">
        </div>
        
        <h2>Please Enter Below The Employee User ID <br> And Time Period For Your Search</h2>

            <div class="search_user">
                <form action="/getTableForCustom?user=userId">
                    <div class="txt_field userId" id="userIdField">
                        <input type="text" id="userId" name="user">
                        <span></span>
                        <label for="userId">User ID: </label>
                    </div>
                    <!--            <div id="time_period">-->
                    <!--                <select>-->
                    <!--                    <option>Past Week</option>-->
                    <!--                    <option>Past Month</option>-->
                    <!--                    <option>Custom</option>-->
                    <!--                </select>-->
                    <!--            </div>-->

                    <!-- <h3>OR</h3> -->

                    <div class="txt_field">

                        <select name="teams" id="teams" onchange=getSelectedValue()>
                            <optgroup label="----------"></optgroup>
                            <option value="Single">Single User Search</option>
                            <optgroup label="----------"></optgroup>
                            <option value="Andrew">Andrew</option>
                            <option value="Vincent">Vincent</option>
                            <option value="Shwetha">Shwetha</option>
                            <option value="John">John</option>
                            <option value="Poras">Poras</option>
                        </select>
                        <span></span>
                        <label for="teams">Select a Team:</label>
                    </div>

                    <div class="date">
                        <div class="txt_field">
                            <input type="date" id="startDate" name="start">
                            <span></span>
                            <label>Start Date:</label>
                        </div>

                        <div class="txt_field">
                            <input type="date" id="endDate" name="end"><br>
                            <span></span>
                            <label>End Date:</label>
                        </div>
                        <div class="date-options">
                            <button type="button" onclick=setDateWeek()>This Week</button>
                            <button type="button" onclick=setDateMonth()>This Month</button>
                            <button type="button" onclick=setDateYear()>This Year</button>
                        </div>
                    </div>

                    <input type="submit" value="Submit">
                    <!-- <div class="teams">
                        <p>Get Team's Hours For Current Week</p>
                        <input type="submit" value="Andrew">
                        <input type="submit" value="Vincent">
                        <input type="submit" value="Shwetha">
                    </div> -->
                </form>
            </div>
    </div>
