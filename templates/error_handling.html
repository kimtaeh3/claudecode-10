{% extends "layout.html" %}
{% block content %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Q360 Automation Tool</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script charset="utf-8" src="index.js"></script>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='error_handling.css')}}">
    </head>
    <body>
        <div class="center_container">
        {% if code == 404 %}
            
            <label class="pageTitle">Page {{name}}</label><br><br>
            
            
            <label class="errorText">Error {{code}}</label> <br><br>

            <label class="descrText">{{description}}</label>
        {% else %}

        <label class="pageTitle">{{name}}</label><br><br>
            
            
        <label class="errorText">Error {{code}}</label> <br><br>

        <label class="descrText">{{description}}</label>  
        {% endif %}
    </div>
    </body>
</html>
{% endblock %}
